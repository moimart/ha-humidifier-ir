<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Humidifier IR Remote — integration icon.
    A stylised water droplet with soft mist clouds above and IR wave arcs
    on the right. Transparent background for brands.home-assistant.io
    compliance.
  -->

  <defs>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#7dd3fc" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#7dd3fc" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="35%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ir" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff9a3d" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff4f8a" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Soft halo behind the droplet -->
  <circle cx="220" cy="300" r="200" fill="url(#halo)"/>

  <!-- Mist clouds above the droplet -->
  <g fill="#bae6fd" opacity="0.85">
    <ellipse cx="160" cy="100" rx="36" ry="14"/>
    <ellipse cx="220" cy="80"  rx="48" ry="18"/>
    <ellipse cx="290" cy="105" rx="40" ry="15"/>
  </g>
  <g fill="#bae6fd" opacity="0.55">
    <ellipse cx="140" cy="150" rx="28" ry="10"/>
    <ellipse cx="200" cy="135" rx="40" ry="13"/>
    <ellipse cx="280" cy="150" rx="32" ry="11"/>
  </g>

  <!-- Water droplet — classic teardrop shape -->
  <path d="M 220 180
           C 140 290, 130 360, 220 430
           C 310 360, 300 290, 220 180 Z"
        fill="url(#drop)"/>
  <!-- Drop highlight -->
  <ellipse cx="190" cy="285" rx="36" ry="60" fill="url(#shine)"/>

  <!-- IR wave arcs (right side accent) -->
  <g fill="none" stroke="url(#ir)" stroke-linecap="round">
    <path d="M 380 248 A 26 56  0 0 1 380 360"  stroke-width="11"/>
    <path d="M 410 220 A 36 84  0 0 1 410 388"  stroke-width="9"  opacity="0.85"/>
    <path d="M 436 192 A 44 112 0 0 1 436 416"  stroke-width="8"  opacity="0.6"/>
  </g>
</svg>
